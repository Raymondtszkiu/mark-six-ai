<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港六合彩 AI 預測儀表板</title>
    
    <!-- 💡 核心修正：更換為 Chart.js 官方最穩定、無障礙的 CDN 載入網址 -->
    <script src="https://cloudflare.com" integrity="sha512-YhcY7b7bHUTbS30tQ966UvJ3H9zWpCunwT0mZfM7N9bJdG6vO6SExxWbC89NqM6m4pP0V0Y171yL1N3Y29w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f7fb; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a365d; }
        .meta-info { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .balls-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 40px; }
        .ball-wrapper { text-align: center; }
        .lotto-ball { width: 55px; height: 55px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000); color: white; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .prob-label { font-size: 12px; color: #777; margin-top: 5px; }
        .chart-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        .chart-container { position: relative; height: 320px; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <h1>🗳️ 香港六合彩 AI 預測儀表板</h1>
    <div id="meta-info" class="meta-info">正在動態載入 AI 數據包...</div>
    
    <h3>🔮 AI 評估：下一期開出機率最高的前 6 個號碼</h3>
    <div id="top-balls" class="balls-container"></div>
    
    <div class="chart-section">
        <h3>💡 隨機森林模型：當前最依賴的開獎特徵權重 (Feature Importances)</h3>
        <div class="chart-container">
            <!-- 確保 Canvas 畫布正常預留空間 -->
            <canvas id="weightChart"></canvas>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
