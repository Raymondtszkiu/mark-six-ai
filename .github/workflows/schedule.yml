name: Mark Six AI Auto-Trainer

on:
  schedule:
    - cron: '15 14 * * *'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 🚀 簽出儲存庫代碼
      uses: actions/checkout@v4

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 安裝機器學習依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install scikit-learn numpy requests

    - name: 🤖 執行 AI 數據爬取與模型訓練
      run: python update_model.py

    - name: 📝 自動提交並推送到 GitHub 靜態環境
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add prediction_result.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新：最新六合彩 AI 預測數據" && git push)
